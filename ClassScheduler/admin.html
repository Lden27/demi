<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="topbar">

  <div class="logo-title">
    <span class="icon">⚙️</span>
    <h2>Admin quản lý lịch học</h2>
  </div>

  <input type="text"
       id="search"
       class="form-control my-3"
       placeholder="Tìm môn học, ngày, giờ, phòng...">

  <button class="logout-btn" onclick="logout()">
    Đăng xuất
  </button>

</div>


<div class="container py-4">

  <div class="form-box">
  
  <form id="form">
    <input id="subject" class="form-control my-2" placeholder="Môn học">
    <input id="date" type="date" class="form-control my-2">
    <input id="time" type="time" class="form-control my-2">
    <input id="room" class="form-control my-2" placeholder="Phòng">

    <button class="btn btn-primary">Thêm</button>
  </form>

</div>

  <div class="table-box">
  <table class="table mt-4">
    <thead>
      <tr>
        <th>Môn</th>
        <th>Ngày</th>
        <th>Giờ</th>
        <th>Phòng</th>
        <th>Xóa</th>
      </tr>
    </thead>
    <tbody id="tb"></tbody>
  </table>

  </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/admin.js"></script>

</body>
</html>
